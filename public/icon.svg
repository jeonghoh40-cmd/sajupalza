<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <clipPath id="left"><rect x="0" y="0" width="256" height="512"/></clipPath>
    <clipPath id="right"><rect x="256" y="0" width="256" height="512"/></clipPath>
    <clipPath id="rounded"><rect x="0" y="0" width="512" height="512" rx="96"/></clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- 왼쪽: 양력(태양) -->
    <rect x="0" y="0" width="256" height="512" fill="url(#sun)"/>
    <text x="128" y="280" text-anchor="middle" font-size="140" fill="rgba(255,255,255,0.4)">☀</text>
    <!-- 오른쪽: 음력(달) -->
    <rect x="256" y="0" width="256" height="512" fill="url(#moon)"/>
    <text x="384" y="280" text-anchor="middle" font-size="140" fill="rgba(255,255,255,0.4)">☽</text>
  </g>
  <!-- 중앙 텍스트 -->
  <text x="256" y="300" text-anchor="middle" font-size="140" font-family="serif" font-weight="bold" fill="white" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.5))">四柱</text>
</svg>
